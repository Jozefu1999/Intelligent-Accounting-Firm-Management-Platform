<div>
  <div class="flex items-center justify-between mb-6">
    <h1 class="text-2xl font-bold text-gray-800">Projects</h1>
    <button type="button" mat-flat-button class="bg-blue-600 text-white" (click)="openAddModal()">+ New Project</button>
  </div>

  <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
    <table class="w-full text-left">
      <thead class="bg-gray-50 border-b border-gray-200">
        <tr>
          <th class="px-5 py-3 text-xs font-medium text-gray-500 uppercase">Project</th>
          <th class="px-5 py-3 text-xs font-medium text-gray-500 uppercase">Client</th>
          <th class="px-5 py-3 text-xs font-medium text-gray-500 uppercase">Type</th>
          <th class="px-5 py-3 text-xs font-medium text-gray-500 uppercase">Status</th>
          <th class="px-5 py-3 text-xs font-medium text-gray-500 uppercase">Priority</th>
          <th class="px-5 py-3 text-xs font-medium text-gray-500 uppercase text-right">Actions</th>
        </tr>
      </thead>
      <tbody class="divide-y divide-gray-100">
        <tr *ngFor="let project of projects" class="hover:bg-gray-50 transition-colors">
          <td class="px-5 py-4 text-sm font-medium text-gray-800">{{ project.titre }}</td>
          <td class="px-5 py-4 text-sm text-gray-600">{{ project.client_nom }}</td>
          <td class="px-5 py-4 text-sm text-gray-600">{{ project.type }}</td>
          <td class="px-5 py-4">
            <span [class]="'badge ' + project.statut">
              {{ project.statut }}
            </span>
          </td>
          <td class="px-5 py-4">
            <span [class]="'badge ' + project.priority">
              {{ project.priority }}
            </span>
          </td>
          <td class="px-5 py-4 text-right">
            <button type="button" (click)="openEditModal(project)" class="mr-3 text-gray-600 hover:text-gray-800">Edit</button>
            <button type="button" (click)="deleteProject(project.id)" class="text-red-500 hover:text-red-700">Delete</button>
          </td>
        </tr>
        <tr *ngIf="projects.length === 0">
          <td colspan="6" class="px-5 py-8 text-center text-gray-400 empty">No projects found.</td>
        </tr>
      </tbody>
    </table>
  </div>

  <div class="modal-overlay" *ngIf="showModal" (click)="closeModal()">
    <div class="modal-content" (click)="$event.stopPropagation()">
      <app-project-form
        [clients]="clients"
        [projectToEdit]="selectedProject"
        (formSubmit)="onFormSubmit($event)"
        (formCancel)="closeModal()"
      ></app-project-form>
    </div>
  </div>
</div>
