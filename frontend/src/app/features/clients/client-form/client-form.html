<div class="mx-auto max-w-4xl">
	<div class="mb-6 flex flex-wrap items-start justify-between gap-4">
		<div>
			<p class="text-xs font-semibold uppercase tracking-[0.2em] text-slate-500">Client management</p>
			<h1 class="mt-1 text-2xl font-bold text-slate-900">
				{{ isEditMode ? 'Edit client' : 'Add new client' }}
			</h1>
			<p class="mt-1 text-sm text-slate-500">Fill in client information to display it in the list page.</p>
		</div>

		<a routerLink="/clients" mat-stroked-button class="border-slate-300 text-slate-700">
			<mat-icon>arrow_back</mat-icon>
			Back to list
		</a>
	</div>

	@if (errorMessage) {
		<div class="mb-5 flex items-start gap-2 rounded-xl border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-700">
			<mat-icon class="text-base">error_outline</mat-icon>
			<span>{{ errorMessage }}</span>
		</div>
	}

	<div class="rounded-2xl border border-slate-200 bg-white p-6 shadow-sm sm:p-8">
		@if (isLoading) {
			<div class="py-12 text-center text-sm text-slate-500">Loading client data...</div>
		} @else {
			<form (ngSubmit)="onSubmit()" class="space-y-6">
				<div class="grid grid-cols-1 gap-4 sm:grid-cols-2">
					<div>
						<label class="mb-1.5 block text-sm font-medium text-slate-700">Name</label>
						<input
							type="text"
							[(ngModel)]="name"
							name="name"
							required
							placeholder="ACME SARL"
							class="w-full rounded-xl border border-slate-200 px-4 py-3 text-sm text-slate-900 outline-none transition placeholder:text-slate-400 focus:border-blue-500 focus:ring-4 focus:ring-blue-100"
						/>
					</div>

					<div>
						<label class="mb-1.5 block text-sm font-medium text-slate-700">Username</label>
						<input
							type="text"
							[(ngModel)]="username"
							name="username"
							required
							placeholder="jdupont"
							class="w-full rounded-xl border border-slate-200 px-4 py-3 text-sm text-slate-900 outline-none transition placeholder:text-slate-400 focus:border-blue-500 focus:ring-4 focus:ring-blue-100"
						/>
					</div>

					<div>
						<label class="mb-1.5 block text-sm font-medium text-slate-700">Phone</label>
						<input
							type="tel"
							[(ngModel)]="phone"
							name="phone"
							placeholder="+212600000000"
							class="w-full rounded-xl border border-slate-200 px-4 py-3 text-sm text-slate-900 outline-none transition placeholder:text-slate-400 focus:border-blue-500 focus:ring-4 focus:ring-blue-100"
						/>
					</div>

					<div>
						<label class="mb-1.5 block text-sm font-medium text-slate-700">Mail</label>
						<input
							type="email"
							[(ngModel)]="mail"
							name="mail"
							placeholder="client@company.com"
							class="w-full rounded-xl border border-slate-200 px-4 py-3 text-sm text-slate-900 outline-none transition placeholder:text-slate-400 focus:border-blue-500 focus:ring-4 focus:ring-blue-100"
						/>
					</div>
				</div>

				<div>
					<label class="mb-1.5 block text-sm font-medium text-slate-700">Adresse</label>
					<textarea
						[(ngModel)]="adresse"
						name="adresse"
						rows="3"
						placeholder="Street, city"
						class="w-full rounded-xl border border-slate-200 px-4 py-3 text-sm text-slate-900 outline-none transition placeholder:text-slate-400 focus:border-blue-500 focus:ring-4 focus:ring-blue-100"
					></textarea>
				</div>

				<div class="flex flex-wrap items-center justify-end gap-3 border-t border-slate-100 pt-4">
					<button type="button" routerLink="/clients" mat-button class="text-slate-600">Cancel</button>

					<button type="submit" [disabled]="isSubmitting" mat-flat-button class="bg-blue-600 text-white">
						@if (isSubmitting) {
							<span class="inline-flex items-center gap-1.5">
								<mat-icon class="animate-spin text-base">refresh</mat-icon>
								<span>{{ isEditMode ? 'Saving...' : 'Creating...' }}</span>
							</span>
						} @else {
							<span>{{ isEditMode ? 'Save client' : 'Create client' }}</span>
						}
					</button>
				</div>
			</form>
		}
	</div>
</div>
