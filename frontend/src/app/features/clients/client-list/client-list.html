<div>
  <div class="flex items-center justify-between mb-6">
    <h1 class="text-2xl font-bold text-gray-800">Clients</h1>
    <a routerLink="/clients/new" mat-flat-button class="bg-blue-600 text-white">
      <mat-icon>add</mat-icon> New Client
    </a>
  </div>

  <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
    <table class="w-full text-left">
      <thead class="bg-gray-50 border-b border-gray-200">
        <tr>
          <th class="px-5 py-3 text-xs font-medium text-gray-500 uppercase">Company</th>
          <th class="px-5 py-3 text-xs font-medium text-gray-500 uppercase">Contact</th>
          <th class="px-5 py-3 text-xs font-medium text-gray-500 uppercase">Sector</th>
          <th class="px-5 py-3 text-xs font-medium text-gray-500 uppercase">Status</th>
          <th class="px-5 py-3 text-xs font-medium text-gray-500 uppercase">Risk</th>
          <th class="px-5 py-3 text-xs font-medium text-gray-500 uppercase text-right">Actions</th>
        </tr>
      </thead>
      <tbody class="divide-y divide-gray-100">
        @for (client of clients; track client.id) {
          <tr class="hover:bg-gray-50 transition-colors">
            <td class="px-5 py-4 text-sm font-medium text-gray-800">{{ client.company_name }}</td>
            <td class="px-5 py-4 text-sm text-gray-600">{{ client.contact_person }}</td>
            <td class="px-5 py-4 text-sm text-gray-600">{{ client.sector }}</td>
            <td class="px-5 py-4">
              <span class="text-xs px-2 py-1 rounded-full font-medium"
                [class]="client.status === 'active' ? 'bg-green-100 text-green-700' : client.status === 'prospect' ? 'bg-blue-100 text-blue-700' : 'bg-gray-100 text-gray-700'">
                {{ client.status }}
              </span>
            </td>
            <td class="px-5 py-4">
              <span class="text-xs px-2 py-1 rounded-full font-medium"
                [class]="client.risk_level === 'high' ? 'bg-red-100 text-red-700' : client.risk_level === 'medium' ? 'bg-yellow-100 text-yellow-700' : 'bg-green-100 text-green-700'">
                {{ client.risk_level }}
              </span>
            </td>
            <td class="px-5 py-4 text-right">
              <a [routerLink]="['/clients', client.id]" class="text-blue-600 hover:text-blue-800 mr-2">
                <mat-icon class="text-lg">visibility</mat-icon>
              </a>
              <a [routerLink]="['/clients', client.id, 'edit']" class="text-gray-500 hover:text-gray-700 mr-2">
                <mat-icon class="text-lg">edit</mat-icon>
              </a>
              <button (click)="deleteClient(client.id)" class="text-red-500 hover:text-red-700">
                <mat-icon class="text-lg">delete</mat-icon>
              </button>
            </td>
          </tr>
        } @empty {
          <tr>
            <td colspan="6" class="px-5 py-8 text-center text-gray-400">No clients found.</td>
          </tr>
        }
      </tbody>
    </table>
  </div>
</div>
