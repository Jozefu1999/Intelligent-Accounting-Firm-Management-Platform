<nav class="sticky top-0 z-30 border-b border-slate-200/70 bg-white/80 px-4 py-3 backdrop-blur-xl sm:px-6 lg:px-8">
  <div class="mx-auto flex max-w-[1600px] items-center justify-between gap-4">
    <div class="flex items-center gap-3">
      <div class="rounded-2xl bg-slate-900 p-2 text-white shadow-sm">
        <mat-icon class="text-[22px]">account_balance</mat-icon>
      </div>
      <div>
        <p class="font-['Sora'] text-base font-semibold tracking-tight text-slate-900">Plateforme Comptable</p>
        <p class="text-xs font-medium uppercase tracking-[0.2em] text-slate-400">Firm Console</p>
      </div>
    </div>

    @if (currentUser$ | async; as user) {
      <div class="flex items-center gap-3 rounded-2xl border border-slate-200 bg-slate-50/85 px-3 py-2">
        <div class="flex h-10 w-10 items-center justify-center rounded-xl bg-cyan-700 text-sm font-bold text-white">
          {{ getInitials(getUserFirstName(user), getUserLastName(user)) }}
        </div>

        <div class="hidden text-right sm:block">
          <p class="text-sm font-semibold text-slate-800">{{ getUserFirstName(user) }} {{ getUserLastName(user) }}</p>
          <p class="text-xs text-slate-500">{{ getRoleLabel(user.role) }}</p>
        </div>

        <button
          mat-icon-button
          (click)="logout()"
          class="!h-9 !w-9 rounded-xl !text-slate-600 hover:!bg-slate-200"
          aria-label="Se déconnecter"
        >
          <mat-icon>logout</mat-icon>
        </button>
      </div>
    }
  </div>
</nav>
