<aside class="w-full shrink-0 border-b border-slate-200/70 bg-white/80 backdrop-blur-xl lg:h-full lg:w-80 lg:border-b-0 lg:border-r">
  <div class="hidden border-b border-slate-200/70 px-5 py-5 lg:block">
    <p class="font-['Sora'] text-sm font-semibold text-slate-900">Navigation</p>
    <p class="mt-1 text-xs text-slate-500">{{ roleLabel }}</p>
  </div>

  <div class="flex h-full flex-col">
    <nav class="overflow-x-auto px-2 py-3 sm:px-4 lg:px-4 lg:py-5">
      <ul class="flex gap-2 lg:block lg:space-y-1">
        @for (item of navItems; track item.path + (item.fragment ?? '')) {
          <li class="min-w-[12rem] lg:min-w-0">
            <a
              [routerLink]="item.path"
              [fragment]="item.fragment"
              routerLinkActive="border-cyan-200 bg-cyan-50/80 text-cyan-800 shadow-sm"
              [routerLinkActiveOptions]="{ exact: item.exact ?? false }"
              class="group flex items-center gap-3 rounded-2xl border border-transparent px-3 py-3 text-slate-600 transition hover:border-cyan-100 hover:bg-cyan-50/60 hover:text-cyan-700"
            >
              <span class="flex h-9 w-9 items-center justify-center rounded-xl bg-slate-100 text-slate-500 transition group-hover:bg-cyan-100 group-hover:text-cyan-700">
                <mat-icon class="text-[20px]">{{ item.icon }}</mat-icon>
              </span>
              <div>
                <p class="text-sm font-semibold">{{ item.label }}</p>
                <p class="text-xs text-slate-400">{{ item.subtitle }}</p>
              </div>
            </a>
          </li>
        }
      </ul>
    </nav>

    <div class="mt-auto border-t border-slate-200/70 p-4">
      <button
        type="button"
        (click)="logout()"
        class="flex w-full items-center justify-center gap-2 rounded-2xl border border-slate-200 bg-white px-3 py-2.5 text-sm font-semibold text-slate-700 transition hover:border-slate-300 hover:bg-slate-50"
      >
        <mat-icon class="text-[20px]">logout</mat-icon>
        Deconnexion
      </button>
    </div>
  </div>
</aside>
