<div class="assistant-shell">
  <aside class="assistant-sidebar">
    <div class="brand-card">
      <p class="brand-eyebrow">Assistant workspace</p>
      <h1 class="brand-title">Operations Hub</h1>
      <p class="brand-meta">{{ todayLabel }}</p>
    </div>

    <nav class="nav-menu">
      <a
        routerLink="/assistant/dashboard"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: true }"
        class="nav-item"
      >
        <span class="nav-icon"><mat-icon>space_dashboard</mat-icon></span>
        <span class="nav-label">Tableau de bord</span>
      </a>

      <a
        routerLink="/assistant/projets"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: true }"
        class="nav-item"
      >
        <span class="nav-icon"><mat-icon>work</mat-icon></span>
        <span class="nav-label">Mes projets</span>
      </a>

      <a
        routerLink="/assistant/documents"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: true }"
        class="nav-item"
      >
        <span class="nav-icon"><mat-icon>description</mat-icon></span>
        <span class="nav-label">Documents</span>
      </a>
    </nav>

    <div class="user-card">
      <p class="user-name">{{ fullName || 'Assistant' }}</p>
      <p class="user-role">Assistant</p>
      <button type="button" class="logout-btn" (click)="logout()">
        <mat-icon>logout</mat-icon>
        <span>Deconnexion</span>
      </button>
    </div>
  </aside>

  <main class="assistant-main">
    <div class="content-surface">
      <router-outlet></router-outlet>
    </div>
  </main>
</div>
