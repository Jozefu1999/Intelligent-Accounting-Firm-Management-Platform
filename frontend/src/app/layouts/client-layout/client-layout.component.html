<div class="client-layout">
  <div class="ambient-glow ambient-glow-left"></div>
  <div class="ambient-glow ambient-glow-right"></div>

  <aside class="client-sidebar">
    <div class="sidebar-profile">
      <p class="sidebar-eyebrow">Accounting Platform</p>
      <div class="profile-chip">
        <div class="avatar">{{ initials }}</div>
        <div>
          <p class="profile-name">{{ displayName }}</p>
          <p class="profile-role">Client Space</p>
        </div>
      </div>
    </div>

    <nav class="sidebar-nav">
      <a routerLink="/client/dashboard" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }" class="nav-link">
        <mat-icon>dashboard</mat-icon>
        <span>Dashboard</span>
      </a>

      <a routerLink="/client/projects" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }" class="nav-link">
        <mat-icon>work</mat-icon>
        <span>My Projects</span>
      </a>

      <a routerLink="/client/profile" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }" class="nav-link">
        <mat-icon>person</mat-icon>
        <span>My Profile</span>
      </a>

      <a routerLink="/client/contact" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }" class="nav-link">
        <mat-icon>mail</mat-icon>
        <span>Contact</span>
      </a>

      <button type="button" class="nav-link nav-link-logout" (click)="logout()">
        <mat-icon>logout</mat-icon>
        <span>Log out</span>
      </button>
    </nav>
  </aside>

  <main class="client-main">
    <div class="client-shell">
      <router-outlet></router-outlet>
    </div>
  </main>
</div>
